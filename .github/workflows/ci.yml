name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun test test/unit/

  integration-test:
    name: Integration tests (Docker WP)
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start WordPress + MySQL
        run: |
          docker compose -f test/integration/docker-compose.yml up -d --wait --timeout 120
          echo "WordPress and MySQL are healthy"

      - name: Setup WordPress
        run: |
          docker compose -f test/integration/docker-compose.yml exec -T wordpress \
            bash /usr/local/bin/setup-wp.sh
          docker compose -f test/integration/docker-compose.yml exec -T wordpress \
            cat /tmp/wp-test-env > /tmp/wp-test-env
          source /tmp/wp-test-env
          echo "WP_TEST_APP_PASSWORD=$APP_PASS" >> $GITHUB_ENV
          echo "WP_TEST_URL=http://localhost:8880" >> $GITHUB_ENV
          echo "WP_TEST_USER=admin" >> $GITHUB_ENV

      - name: Verify WordPress REST API
        run: |
          source /tmp/wp-test-env
          echo "Polling REST API until it returns JSON..."
          for i in $(seq 1 20); do
            CT=$(curl -sIL -u "admin:$APP_PASS" \
              http://localhost:8880/wp-json/wp/v2/media/ 2>/dev/null \
              | grep -i "^content-type" | tail -1)
            if echo "$CT" | grep -qi "application/json"; then
              echo "REST API is ready (JSON response confirmed)"
              break
            fi
            echo "content-type: ${CT:-none}, retrying ($i/20)..."
            sleep 3
          done
          if ! echo "$CT" | grep -qi "application/json"; then
            echo "ERROR: REST API never returned JSON"
            curl -vL -u "admin:$APP_PASS" http://localhost:8880/wp-json/wp/v2/media/ || true
            exit 1
          fi
          echo "Verifying authenticated write access (/users/me requires auth)..."
          ME_STATUS=$(curl -sL -o /dev/null -w "%{http_code}" \
            -u "admin:$APP_PASS" \
            http://localhost:8880/wp-json/wp/v2/users/me)
          if [ "$ME_STATUS" != "200" ]; then
            echo "ERROR: Auth check failed — /users/me returned $ME_STATUS (expected 200)"
            curl -sL -u "admin:$APP_PASS" http://localhost:8880/wp-json/wp/v2/users/me | head -c 500
            exit 1
          fi
          echo "Auth check: OK (HTTP $ME_STATUS)"

      - name: Debug REST API response
        run: |
          source /tmp/wp-test-env
          echo "=== Headers + body for media endpoint (with query params, no trailing slash) ==="
          curl -sLD - -u "admin:$APP_PASS" \
            "http://localhost:8880/wp-json/wp/v2/media?per_page=1&page=1&orderby=date&order=desc" \
            2>&1 | head -60

      - name: Run integration tests
        run: bun test test/integration/

      - name: Cleanup
        if: always()
        run: docker compose -f test/integration/docker-compose.yml down -v

  tarball-smoke-test:
    name: Tarball smoke test
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build tarball (linux-x64)
        run: bun run build:linux-x64

      - name: Debug tarball contents (top 10 largest packages)
        run: |
          du -sm dist/localpress-linux-x64/node_modules/*/ 2>/dev/null | sort -rn | head -10

      - name: Run tarball smoke tests
        run: bun run test:tarball

  build-binaries:
    name: Build binaries
    needs: lint-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all targets
        run: bun run build:all

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: localpress-binaries
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
