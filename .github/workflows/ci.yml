name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun test test/unit/

  integration-test:
    name: Integration tests (Docker WP)
    runs-on: ubuntu-latest
    needs: lint-and-test
    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: wordpress
          MYSQL_USER: wp
          MYSQL_PASSWORD: wppass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -prootpass"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start WordPress
        run: |
          docker run -d --name wp-test \
            --network ${{ job.services.db.network }} \
            -e WORDPRESS_DB_HOST=db \
            -e WORDPRESS_DB_USER=wp \
            -e WORDPRESS_DB_PASSWORD=wppass \
            -e WORDPRESS_DB_NAME=wordpress \
            -p 8880:80 \
            wordpress:6.7-php8.3-apache

      - name: Wait for WordPress
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8880/wp-login.php > /dev/null 2>&1; then
              echo "WordPress is ready"
              break
            fi
            echo "Waiting for WordPress... ($i/30)"
            sleep 5
          done

      - name: Setup WordPress
        run: |
          # Install WP-CLI in the container
          docker exec wp-test bash -c '
            curl -sO https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
            chmod +x wp-cli.phar
            mv wp-cli.phar /usr/local/bin/wp

            wp core install \
              --url="http://localhost:80" \
              --title="localpress CI" \
              --admin_user=admin \
              --admin_password=admin123 \
              --admin_email=admin@test.local \
              --path=/var/www/html \
              --allow-root \
              --skip-email

            APP_PASS=$(wp user application-password create admin "ci-test" \
              --porcelain --path=/var/www/html --allow-root)
            echo "APP_PASS=$APP_PASS" > /tmp/wp-test-env
          '
          # Extract the app password
          docker cp wp-test:/tmp/wp-test-env /tmp/wp-test-env
          source /tmp/wp-test-env
          echo "WP_TEST_APP_PASSWORD=$APP_PASS" >> $GITHUB_ENV
          echo "WP_TEST_URL=http://localhost:8880" >> $GITHUB_ENV
          echo "WP_TEST_USER=admin" >> $GITHUB_ENV

      - name: Upload test images
        run: |
          docker exec wp-test bash -c '
            php -r '\''
              $img = imagecreatetruecolor(800, 600);
              $bg = imagecolorallocate($img, 100, 150, 200);
              imagefill($img, 0, 0, $bg);
              imagejpeg($img, "/tmp/test-1.jpg", 95);
              imagedestroy($img);
            '\''
            wp media import /tmp/test-1.jpg --path=/var/www/html --allow-root --title="test-image-1"
          '

      - name: Run integration tests
        run: bun test test/integration/

      - name: Cleanup
        if: always()
        run: docker rm -f wp-test || true

  build-binaries:
    name: Build binaries
    needs: lint-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all targets
        run: bun run build:all

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: localpress-binaries
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
