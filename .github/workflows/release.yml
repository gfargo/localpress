name: Release

# Builds platform binaries, creates a GitHub Release, and updates
# the Homebrew formula with the correct SHA256 checksums.
#
# Prerequisites:
#   - HOMEBREW_TAP_TOKEN secret: a GitHub PAT with `repo` scope on
#     the homebrew-localpress tap repository (gfargo/homebrew-localpress).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun test test/unit/

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build all targets
        run: bun run build:all

      - name: Compute SHA256 checksums
        id: checksums
        run: |
          echo "darwin_arm64=$(sha256sum dist/localpress-darwin-arm64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "darwin_x64=$(sha256sum dist/localpress-darwin-x64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum dist/localpress-linux-arm64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_x64=$(sha256sum dist/localpress-linux-x64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/localpress-darwin-arm64
            dist/localpress-darwin-x64
            dist/localpress-linux-arm64
            dist/localpress-linux-x64
            dist/localpress-windows-x64.exe
          generate_release_notes: true
          make_latest: true

      - name: Update Homebrew formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256_DARWIN_ARM64: ${{ steps.checksums.outputs.darwin_arm64 }}
          SHA256_DARWIN_X64: ${{ steps.checksums.outputs.darwin_x64 }}
          SHA256_LINUX_ARM64: ${{ steps.checksums.outputs.linux_arm64 }}
          SHA256_LINUX_X64: ${{ steps.checksums.outputs.linux_x64 }}
        run: |
          # Update version line
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/localpress.rb

          # Replace SHA256 placeholders (first release) or existing hashes (subsequent releases)
          # The formula has exactly 4 sha256 lines in order: darwin-arm64, darwin-x64, linux-arm64, linux-x64
          sed -i "0,/sha256 \"[0-9a-fA-F_]*\"/s//sha256 \"${SHA256_DARWIN_ARM64}\"/" Formula/localpress.rb
          sed -i "0,/sha256 \"[0-9a-fA-F]*\"/{ /sha256 \"${SHA256_DARWIN_ARM64}\"/!s/sha256 \"[0-9a-fA-F_]*\"/sha256 \"${SHA256_DARWIN_X64}\"/; }" Formula/localpress.rb

          # Simpler approach: just write the whole file with correct values
          python3 -c "
          import os
          v = os.environ['VERSION']
          shas = [
              os.environ['SHA256_DARWIN_ARM64'],
              os.environ['SHA256_DARWIN_X64'],
              os.environ['SHA256_LINUX_ARM64'],
              os.environ['SHA256_LINUX_X64'],
          ]
          with open('Formula/localpress.rb', 'r') as f:
              lines = f.readlines()
          idx = 0
          out = []
          for line in lines:
              stripped = line.strip()
              if stripped.startswith('sha256 '):
                  if idx < len(shas):
                      indent = line[:len(line) - len(line.lstrip())]
                      out.append(indent + 'sha256 \"' + shas[idx] + '\"\n')
                      idx += 1
                  else:
                      out.append(line)
              elif stripped.startswith('version '):
                  indent = line[:len(line) - len(line.lstrip())]
                  out.append(indent + 'version \"' + v + '\"\n')
              else:
                  out.append(line)
          with open('Formula/localpress.rb', 'w') as f:
              f.writelines(out)
          "

      - name: Commit updated formula
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/localpress.rb
          git diff --staged --quiet || git commit -m "chore: update Homebrew formula to v${{ steps.version.outputs.version }}"
          git push origin HEAD:main

      - name: Push formula to homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping tap push. Add it to repo secrets to enable."
            exit 0
          fi
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/gfargo/homebrew-localpress.git /tmp/tap
          cp Formula/localpress.rb /tmp/tap/Formula/localpress.rb
          cd /tmp/tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/localpress.rb
          git diff --staged --quiet || git commit -m "chore: update formula to v${VERSION}"
          git push origin main
