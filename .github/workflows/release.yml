name: Release (manual)

# Manual fallback for the automated release-please flow (release-please.yml).
#
# Normal releases happen by merging the "Release vX.Y.Z" PR that release-please
# maintains. This workflow exists for the rare case where you need to cut a
# release by hand — push a v* tag and it runs the same build/publish pipeline:
#
#   git tag -a v2.2.0 -m "v2.2.0" && git push origin v2.2.0
#
# Note: tags created by release-please use GITHUB_TOKEN, which by design does
# NOT trigger this tag-push workflow (no double builds). Only tags you push
# yourself land here.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/release-build.yml
    with:
      tag: ${{ github.ref_name }}
    secrets: inherit
